name: Deploy to Github Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  deploy:
    uses: "getpelican/pelican/.github/workflows/github_pages.yml@main"
    permissions:
      contents: "read"
      pages: "write"
      id-token: "write"
    with:
      settings: "publishconf.py"
      extra_args: '--path content --output output --extra-settings SITEURL="https://greatandpowerfulponyboy.github.io'
